<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upit poslat – Kreditoteka</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    .success-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1358a0 0%, #1a6fc4 60%, #2389e0 100%);
      text-align: center;
      padding: 24px;
    }
    .success-box {
      background: white;
      border-radius: 20px;
      padding: 56px 48px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    }
    .success-icon {
      width: 72px;
      height: 72px;
      background: #e8f1fb;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 2rem;
    }
    .success-box h1 {
      font-size: 1.8rem;
      font-weight: 800;
      color: #1a1f2e;
      margin-bottom: 12px;
    }
    .success-box p {
      font-size: 15px;
      color: #5a6478;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .success-box a {
      display: inline-block;
      background: #1a6fc4;
      color: white;
      font-weight: 700;
      font-size: 15px;
      padding: 14px 32px;
      border-radius: 10px;
      text-decoration: none;
      transition: background .2s;
    }
    .success-box a:hover { background: #1358a0; }
  </style>
</head>
<body>
  <div class="success-page">
    <div class="success-box">
      <div class="success-icon">✅</div>
      <h1>Upit je uspešno poslat!</h1>
      <p>Hvala Vam na poverenju. Javićemo Vam se u najkraćem mogućem roku.</p>
      <a href="/">Nazad na početnu</a>
    </div>
  </div>
</body>
</html>
